<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:Zero SS4 หอคอยเพลอาดัส • พี่จู uwufufu - Dynamic AI Visual Novel</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styleheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- AI Chatbot Main Interface -->
        <div id="chatbot-stage" class="chatbot-stage">
            <div class="chatbot-background"></div>
            
            <!-- Chat Header -->
            <div class="chatbot-header">
                <div class="header-brand">
                    <div class="logo-icon"><i class="fa-solid fa-ghost"></i></div>
                    <div class="brand-info">
                        <h1 class="brand-title">พี่จู uwufufu <span class="highlight">AI Chat</span></h1>
                        <p class="brand-subtitle">คุยกับจิตใต้สำนึกของ นัตสึเกะ สุบารุ ที่หอคอยเพลอาดัส</p>
                    </div>
                </div>
                <div class="header-controls">
                    <button id="btn-toggle-sound" class="header-btn" title="เปิด/ปิดเสียงประมวลผล">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <button id="btn-clear-chat" class="header-btn accent" title="เริ่มบทสนทนาใหม่">
                        <i class="fa-solid fa-arrows-rotate"></i> รีเซ็ตแชท
                    </button>
                    <div class="status-badge">
                        <span class="status-indicator"></span> AI Online
                    </div>
                </div>
            </div>

            <!-- Chat Content Area -->
            <div class="chatbot-content">
                <!-- Character Sprite Panel -->
                <div class="character-panel">
                    <div class="sprite-glow-effect"></div>
                    <img id="character-sprite" src="assets/subaru_normal.webp" alt="พี่จู uwufufu" class="character-sprite float">
                    <div class="character-tag">พี่จู uwufufu</div>
                </div>

                <!-- Chat History Panel -->
                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages">
                        <!-- Welcome message -->
                        <div class="message model">
                            <div class="message-bubble">
                                ยินดีต้อนรับสู่โหมดแชทอิสระครับ! คุยเรื่องอะไรกับผมก็ได้นะ หรือมีเรื่องอะไรที่อยากระบายหรืออยากให้ผมช่วยหาทางออกก็บอกได้เลยนะ! ถึงผมจะไม่ได้เก่งอะไรมาก แต่สัญญาเลยว่าไม่ทิ้งคุณไปแน่ๆ!
                            </div>
                        </div>
                    </div>

                    <!-- Chat Input Bar -->
                    <div class="chat-input-panel">
                        <input type="text" id="chat-input" placeholder="พิมพ์ข้อความพูดคุยกับ พี่จู uwufufu ที่นี่..." maxlength="250" autofocus>
                        <button id="btn-send" class="send-btn" title="ส่งข้อความ">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- System Toasts (Notifications) -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Core Game Logic -->
    <script src="app.js" defer></script>
</body>
</html>
